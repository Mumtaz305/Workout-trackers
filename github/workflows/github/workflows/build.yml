name: Build APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/sadtaz/workout
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

      - name: Write Kotlin Files
        run: |
          cat > app/src/main/java/com/sadtaz/workout/WorkoutData.kt << 'EOF'
          package com.sadtaz.workout
          enum class ExerciseType { NORMAL, PLANK, CARDIO }
          fun getExerciseType(name: String): ExerciseType = when (name) {
              "Plank"  -> ExerciseType.PLANK
              "Cardio" -> ExerciseType.CARDIO
              else     -> ExerciseType.NORMAL
          }
          data class WorkoutDay(val dayCode: String, val dayLabel: String, val muscleGroup: String, val exercises: List<String>)
          object WorkoutPlan {
              val days = listOf(
                  WorkoutDay("MON", "Monday", "Chest", listOf("Bench Press", "Incline Bench Press", "Pec Fly", "Cable Crossover")),
                  WorkoutDay("TUE", "Tuesday", "Back", listOf("Lat Pulldown", "T-Bar Row", "Single Hand Dumbbell Row")),
                  WorkoutDay("WED", "Wednesday", "Legs", listOf("Squat", "Leg Press", "Leg Extension", "Leg Curl", "Calf Raises")),
                  WorkoutDay("THU", "Thursday", "Shoulders", listOf("Dumbbell Press", "Cable Side Lateral", "Cable Rear Delt Pull")),
                  WorkoutDay("FRI", "Friday", "Biceps & Triceps", listOf("Dumbbell Curl", "Preacher Curl", "Hammer Curl", "Overhead Tricep Extension", "Cable Pushdown")),
                  WorkoutDay("SAT", "Saturday", "Cardio & Abs", listOf("Abs Crunches", "Plank", "Cardio"))
              )
              fun forDayCode(code: String) = days.find { it.dayCode == code }
          }
          data class SetInput(val setNumber: Int, var reps: Int = 0, var weightKg: Float = 0f, var minutes: Float = 0f, var speedKmh: Float = 0f)
          class WorkoutRepository(private val dao: WorkoutDao) {
              fun getAllSets() = dao.getAllSets()
              fun getSetsForDate(date: String) = dao.getSetsForDate(date)
              fun getAllWorkoutDates() = dao.getAllWorkoutDates()
              fun getTotalWorkoutDays() = dao.getTotalWorkoutDays()
              fun getTotalSets() = dao.getTotalSets()
              fun getHistoryForExercise(ex: String) = dao.getHistoryForExercise(ex)
              fun getMaxWeight(ex: String) = dao.getMaxWeight(ex)
              fun getMaxMinutes(ex: String) = dao.getMaxMinutes(ex)
              suspend fun getSetsForExerciseAndDate(exercise: String, date: String) = dao.getSetsForExerciseAndDate(exercise, date)
              suspend fun saveSets(exercise: String, muscle: String, dayCode: String, date: String, sets: List<SetInput>) {
                  dao.deleteExerciseForDate(exercise, date)
                  val entities = sets.map { s -> WorkoutSet(exerciseName = exercise, muscleGroup = muscle, dayOfWeek = dayCode, setNumber = s.setNumber, loggedDate = date, reps = s.reps, weightKg = s.weightKg, minutes = s.minutes, speedKmh = s.speedKmh) }
                  dao.insertSets(entities)
              }
          }
          EOF

          cat > app/src/main/java/com/sadtaz/workout/Database.kt << 'EOF'
          package com.sadtaz.workout
          import android.content.Context
          import androidx.room.*
          import kotlinx.coroutines.flow.Flow
          @Entity(tableName = "workout_sets")
          data class WorkoutSet(@PrimaryKey(autoGenerate = true) val id: Int = 0, val exerciseName: String, val muscleGroup: String, val dayOfWeek: String, val setNumber: Int, val loggedDate: String, val timestamp: Long = System.currentTimeMillis(), val reps: Int = 0, val weightKg: Float = 0f, val minutes: Float = 0f, val speedKmh: Float = 0f)
          @Dao
          interface WorkoutDao {
              @Insert(onConflict = OnConflictStrategy.REPLACE) suspend fun insertSets(sets: List<WorkoutSet>)
              @Query("DELETE FROM workout_sets WHERE exerciseName = :exercise AND loggedDate = :date") suspend fun deleteExerciseForDate(exercise: String, date: String)
              @Query("SELECT * FROM workout_sets WHERE loggedDate = :date ORDER BY exerciseName, setNumber") fun getSetsForDate(date: String): Flow<List<WorkoutSet>>
              @Query("SELECT * FROM workout_sets WHERE exerciseName = :exercise ORDER BY loggedDate ASC") fun getHistoryForExercise(exercise: String): Flow<List<WorkoutSet>>
              @Query("SELECT * FROM workout_sets ORDER BY timestamp DESC") fun getAllSets(): Flow<List<WorkoutSet>>
              @Query("SELECT DISTINCT loggedDate FROM workout_sets ORDER BY loggedDate DESC") fun getAllWorkoutDates(): Flow<List<String>>
              @Query("SELECT * FROM workout_sets WHERE loggedDate = :date AND exerciseName = :exercise ORDER BY setNumber") suspend fun getSetsForExerciseAndDate(exercise: String, date: String): List<WorkoutSet>
              @Query("SELECT COUNT(DISTINCT loggedDate) FROM workout_sets") fun getTotalWorkoutDays(): Flow<Int>
              @Query("SELECT COUNT(*) FROM workout_sets") fun getTotalSets(): Flow<Int>
              @Query("SELECT MAX(weightKg) FROM workout_sets WHERE exerciseName = :exercise AND weightKg > 0") fun getMaxWeight(exercise: String): Flow<Float?>
              @Query("SELECT MAX(minutes) FROM workout_sets WHERE exerciseName = :exercise AND minutes > 0") fun getMaxMinutes(exercise: String): Flow<Float?>
          }
          @Database(entities = [WorkoutSet::class], version = 1, exportSchema = false)
          abstract class WorkoutDatabase : RoomDatabase() {
              abstract fun workoutDao(): WorkoutDao
              companion object {
                  @Volatile private var INSTANCE: WorkoutDatabase? = null
                  fun getInstance(context: Context): WorkoutDatabase = INSTANCE ?: synchronized(this) { Room.databaseBuilder(context.applicationContext, WorkoutDatabase::class.java, "sadtaz_workout_db").build().also { INSTANCE = it } }
              }
          }
          EOF

      - name: Write Activity Files
        run: |
          cat > app/src/main/java/com/sadtaz/workout/MainActivity.kt << 'EOF'
          package com.sadtaz.workout
          import android.content.Intent
          import android.os.Bundle
          import android.view.*
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import com.google.android.material.tabs.TabLayout
          import java.text.SimpleDateFormat
          import java.util.*
          class MainActivity : AppCompatActivity() {
              private var selectedDayIndex = 0
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val tabLayout = findViewById<TabLayout>(R.id.tabLayout)
                  val tvTitle   = findViewById<TextView>(R.id.tvDayTitle)
                  val tvMuscle  = findViewById<TextView>(R.id.tvMuscle)
                  val tvDate    = findViewById<TextView>(R.id.tvDate)
                  val recycler  = findViewById<RecyclerView>(R.id.recyclerView)
                  tvDate.text = SimpleDateFormat("dd MMM yyyy", Locale.getDefault()).format(Date())
                  val todayCode = when (Calendar.getInstance().get(Calendar.DAY_OF_WEEK)) {
                      Calendar.MONDAY -> "MON"; Calendar.TUESDAY -> "TUE"; Calendar.WEDNESDAY -> "WED"
                      Calendar.THURSDAY -> "THU"; Calendar.FRIDAY -> "FRI"; Calendar.SATURDAY -> "SAT"
                      else -> "MON"
                  }
                  selectedDayIndex = WorkoutPlan.days.indexOfFirst { it.dayCode == todayCode }.coerceAtLeast(0)
                  WorkoutPlan.days.forEach { tabLayout.addTab(tabLayout.newTab().setText(it.dayCode)) }
                  tabLayout.getTabAt(selectedDayIndex)?.select()
                  fun loadDay(index: Int) {
                      val day = WorkoutPlan.days[index]
                      tvTitle.text = day.dayLabel
                      tvMuscle.text = day.muscleGroup
                      recycler.layoutManager = LinearLayoutManager(this)
                      recycler.adapter = ExerciseAdapter(day) { ex ->
                          startActivity(Intent(this, LogWorkoutActivity::class.java).apply {
                              putExtra("exercise", ex); putExtra("muscle", day.muscleGroup); putExtra("dayCode", day.dayCode)
                          })
                      }
                  }
                  tabLayout.addOnTabSelectedListener(object : TabLayout.OnTabSelectedListener {
                      override fun onTabSelected(t: TabLayout.Tab) { selectedDayIndex = t.position; loadDay(selectedDayIndex) }
                      override fun onTabUnselected(t: TabLayout.Tab) {}
                      override fun onTabReselected(t: TabLayout.Tab) {}
                  })
                  loadDay(selectedDayIndex)
                  findViewById<View>(R.id.btnHistory).setOnClickListener { startActivity(Intent(this, HistoryActivity::class.java)) }
                  findViewById<View>(R.id.btnGraph).setOnClickListener { startActivity(Intent(this, GraphActivity::class.java)) }
              }
          }
          class ExerciseAdapter(private val day: WorkoutDay, private val onClick: (String) -> Unit) : RecyclerView.Adapter<ExerciseAdapter.VH>() {
              inner class VH(v: View) : RecyclerView.ViewHolder(v) {
                  val tvName: TextView = v.findViewById(R.id.tvExerciseName)
                  val tvSub: TextView = v.findViewById(R.id.tvTapToLog)
              }
              override fun onCreateViewHolder(p: ViewGroup, t: Int) = VH(LayoutInflater.from(p.context).inflate(R.layout.item_exercise, p, false))
              override fun onBindViewHolder(h: VH, pos: Int) {
                  val ex = day.exercises[pos]
                  h.tvName.text = ex
                  h.tvSub.text = when (getExerciseType(ex)) { ExerciseType.PLANK -> "Sets � Minutes"; ExerciseType.CARDIO -> "Sets � Minutes � Speed"; else -> "Reps � Weight (kg)" }
                  h.itemView.setOnClickListener { onClick(ex) }
              }
              override fun getItemCount() = day.exercises.size
          }
          EOF

          cat > app/src/main/java/com/sadtaz/workout/HistoryActivity.kt << 'EOF'
          package com.sadtaz.workout
          import android.os.Bundle
          import android.view.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import kotlinx.coroutines.flow.collectLatest
          import kotlinx.coroutines.launch
          class HistoryActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_history)
                  findViewById<ImageView>(R.id.btnBack).setOnClickListener { finish() }
                  val repo = WorkoutRepository(WorkoutDatabase.getInstance(this).workoutDao())
                  val rv = findViewById<RecyclerView>(R.id.rvHistory)
                  rv.layoutManager = LinearLayoutManager(this)
                  lifecycleScope.launch {
                      repo.getAllSets().collectLatest { allSets ->
                          val items = mutableListOf<HistoryItem>()
                          if (allSets.isEmpty()) { items.add(HistoryItem.Header("Abhi koi workout log nahi hai")); rv.adapter = HistoryAdapter(items); return@collectLatest }

                  
                          allSets.groupBy { it.loggedDate }.entries.sortedByDescending { it.key }.forEach { (date, daySets) ->
                              items.add(HistoryItem.Header(date))
                              daySets.groupBy { it.exerciseName }.forEach { (ex, exSets) ->
                                  val type = getExerciseType(ex)
                                  val detail = when (type) { ExerciseType.PLANK -> "${exSets.size} sets ��� ${exSets.maxOf { it.minutes }} min max"; ExerciseType.CARDIO -> "${exSets.size} sets ��� ${exSets.maxOf { it.minutes }} min ��� ${exSets.maxOf {
                                  it.speedKmh }} km/h"; else -> "${exSets.size} sets ��� ${exSets.maxOf { it.weightKg }} kg max" }
                                  items.add(HistoryItem.Entry(ex, exSets.first().muscleGroup, detail))
                              }
                          }
                          rv.adapter = HistoryAdapter(items)
                      }
                  }
              }
          }
          sealed class HistoryItem { data class Header(val date: String) : HistoryItem(); data class Entry(val exercise: String, val muscle: String, val detail: String) : HistoryItem() }
          class HistoryAdapter(private val items: List<HistoryItem>) : RecyclerView.Adapter<RecyclerView.ViewHolder>() {
              override fun getItemViewType(pos: Int) = if (items[pos] is HistoryItem.Header) 0 else 1
              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): RecyclerView.ViewHolder {
                  val layout = if (viewType == 0) R.layout.item_history_date else R.layout.item_history_entry
                  return object : RecyclerView.ViewHolder(LayoutInflater.from(parent.context).inflate(layout, parent, false)) {}
              }
              override fun onBindViewHolder(holder: RecyclerView.ViewHolder, pos: Int) {
                  when (val item = items[pos]) {
                      is HistoryItem.Header -> holder.itemView.findViewById<TextView>(R.id.tvDate).text = item.date
                      is HistoryItem.Entry -> { holder.itemView.findViewById<TextView>(R.id.tvExName).text = item.exercise; holder.itemView.findViewById<TextView>(R.id.tvDetail).text = "${item.muscle} ��� ${item.detail}" }
                  }
              }
              override fun getItemCount() = items.size
          }
          EOF

      - name: Write LogWorkout and Graph Activities
        run: |
          cat > app/src/main/java/com/sadtaz/workout/LogWorkoutActivity.kt << 'EOF'
          package com.sadtaz.workout
          import android.os.Bundle
          import android.text.Editable
          import android.text.TextWatcher
          import android.view.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import kotlinx.coroutines.launch
          import java.text.SimpleDateFormat
          import java.util.*
          class LogWorkoutActivity : AppCompatActivity() {
              private lateinit var repo: WorkoutRepository
              private lateinit var exercise: String
              private lateinit var muscle: String
              private lateinit var dayCode: String
              private lateinit var todayDate: String
              private lateinit var exType: ExerciseType
              private val setInputs = mutableListOf<SetInput>()
              private lateinit var setsAdapter: SetsInputAdapter
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_log_workout)
                  exercise = intent.getStringExtra("exercise") ?: run { finish(); return }
                  muscle = intent.getStringExtra("muscle") ?: ""
                  dayCode = intent.getStringExtra("dayCode") ?: ""
                  exType = getExerciseType(exercise)
                  todayDate = SimpleDateFormat("yyyy-MM-dd", Locale.getDefault()).format(Date())
                  repo = WorkoutRepository(WorkoutDatabase.getInstance(this).workoutDao())
                  findViewById<TextView>(R.id.tvExerciseTitle).text = exercise
                  findViewById<TextView>(R.id.tvMuscleLabel).text = muscle
                  findViewById<ImageView>(R.id.btnBack).setOnClickListener { finish() }
                  val tvH1 = findViewById<TextView>(R.id.tvColA); val tvH2 = findViewById<TextView>(R.id.tvColB); val tvH3 = findViewById<TextView>(R.id.tvColC)
                  when (exType) { ExerciseType.PLANK -> { tvH1.text = "SET"; tvH2.text = "MINUTES"; tvH3.visibility = View.GONE }; ExerciseType.CARDIO -> { tvH1.text = "SET"; tvH2.text = "MINUTES"; tvH3.text = "SPEED (km/h)"; tvH3.visibility = View.VISIBLE }; else -> { tvH1.text = "SET"; tvH2.text = "REPS"; tvH3.text = "WEIGHT (kg)"; tvH3.visibility = View.VISIBLE } }
                  val rv = findViewById<RecyclerView>(R.id.rvSets)
                  setsAdapter = SetsInputAdapter(setInputs, exType)
                  rv.layoutManager = LinearLayoutManager(this)
                  rv.adapter = setsAdapter
                  lifecycleScope.launch {
                      val existing = repo.getSetsForExerciseAndDate(exercise, todayDate)
                      setInputs.clear()
                      if (existing.isNotEmpty()) existing.forEach { setInputs.add(SetInput(it.setNumber, it.reps, it.weightKg, it.minutes, it.speedKmh)) } else setInputs.add(SetInput(1))
                      setsAdapter.notifyDataSetChanged()
                  }
                  findViewById<Button>(R.id.btnAddSet).setOnClickListener { setInputs.add(SetInput(setInputs.size � 1)); setsAdapter.notifyItemInserted(setInputs.size - 1); rv.smoothScrollToPosition(setInputs.size - 1) }
                  findViewById<Button>(R.id.btnSave).setOnClickListener {
                      lifecycleScope.launch {
                          val toSave = setInputs.filterIndexed { _, s -> when (exType) { ExerciseType.PLANK, ExerciseType.CARDIO -> s.minutes > 0f; else -> s.reps > 0 || s.weightKg > 0f } }.mapIndexed { i, s -> s.copy(setNumber = i � 1) }
                          if (toSave.isEmpty()) { Toast.makeText(this@LogWorkoutActivity, "Kuch values enter karo pehle!", Toast.LENGTH_SHORT).show(); return@launch }
                          repo.saveSets(exercise, muscle, dayCode, todayDate, toSave)
                          Toast.makeText(this@LogWorkoutActivity, "Saved!", Toast.LENGTH_SHORT).show()
                          finish()
                      }
                  }
              }
          }
          class SetsInputAdapter(private val sets: MutableList<SetInput>, private val type: ExerciseType) : RecyclerView.Adapter<SetsInputAdapter.VH>() {
              inner class VH(v: View) : RecyclerView.ViewHolder(v) { val tvNum: TextView = v.findViewById(R.id.tvSetNum); val etA: EditText = v.findViewById(R.id.etFieldA); val etB: EditText = v.findViewById(R.id.etFieldB); val etC: EditText = v.findViewById(R.id.etFieldC); val btnDel: ImageView = v.findViewById(R.id.btnDelSet); var watcherA: TextWatcher? = null; var watcherB: TextWatcher? = null }
              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int) = VH(LayoutInflater.from(parent.context).inflate(R.layout.item_set_row, parent, false))
              override fun onBindViewHolder(holder: VH, position: Int) {
                  val s = sets[position]
                  holder.tvNum.text = "${position � 1}"
                  holder.etA.removeTextChangedListener(holder.watcherA); holder.etB.removeTextChangedListener(holder.watcherB)
                  when (type) { ExerciseType.PLANK -> { holder.etA.hint = "Minutes"; holder.etA.setText(if (s.minutes > 0f) s.minutes.toString() else ""); holder.etB.visibility = View.GONE; holder.etC.visibility = View.GONE }; ExerciseType.CARDIO -> { holder.etA.hint = "Minutes"; holder.etB.hint = "Speed (km/h)"; holder.etA.setText(if (s.minutes > 0f) s.minutes.toString() else ""); holder.etB.setText(if (s.speedKmh > 0f) s.speedKmh.toString() else ""); holder.etB.visibility = View.VISIBLE; holder.etC.visibility = View.GONE }; else -> { holder.etA.hint = "Reps"; holder.etB.hint = "Weight (kg)"; holder.etA.setText(if (s.reps > 0) s.reps.toString() else ""); holder.etB.setText(if (s.weightKg > 0f) s.weightKg.toString() else ""); holder.etB.visibility = View.VISIBLE; holder.etC.visibility = View.GONE } }
                  holder.watcherA = watcher { text -> val idx = holder.adapterPosition; if (idx < 0) return@watcher; when (type) { ExerciseType.PLANK, ExerciseType.CARDIO -> sets[idx].minutes = text.toFloatOrNull() ?: 0f; else -> sets[idx].reps = text.toIntOrNull() ?: 0 } }
                  holder.watcherB = watcher { text -> val idx = holder.adapterPosition; if (idx < 0) return@watcher; when (type) { ExerciseType.CARDIO -> sets[idx].speedKmh = text.toFloatOrNull() ?: 0f; else -> sets[idx].weightKg = text.toFloatOrNull() ?: 0f } }
                  holder.etA.addTextChangedListener(holder.watcherA); holder.etB.addTextChangedListener(holder.watcherB)
                  holder.btnDel.setOnClickListener { val idx = holder.adapterPosition; if (idx >= 0 && sets.size > 1) { sets.removeAt(idx); notifyItemRemoved(idx); notifyItemRangeChanged(idx, sets.size) } }
              }
              override fun getItemCount() = sets.size
              private fun watcher(cb: (String) -> Unit) = object : TextWatcher { override fun beforeTextChanged(s: CharSequence?, st: Int, c: Int, a: Int) {}; override fun onTextChanged(s: CharSequence?, st: Int, b: Int, c: Int) {}; override fun afterTextChanged(s: Editable?) { cb(s?.toString().orEmpty()) } }
          }
          EOF

          cat > app/src/main/java/com/sadtaz/workout/GraphActivity.kt << 'EOF'
          package com.sadtaz.workout
          import android.graphics.Color
          import android.os.Bundle
          import android.view.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import com.github.mikephil.charting.charts.LineChart
          import com.github.mikephil.charting.components.XAxis
          import com.github.mikephil.charting.data.*
          import com.github.mikephil.charting.formatter.IndexAxisValueFormatter
          import kotlinx.coroutines.flow.collectLatest
          import kotlinx.coroutines.launch
          class GraphActivity : AppCompatActivity() {
              private val repo by lazy { WorkoutRepository(WorkoutDatabase.getInstance(this).workoutDao()) }
              private val allExercises = WorkoutPlan.days.flatMap { it.exercises }
              private var selectedExercise = ""
              private var chart: LineChart? = null
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_graph)
                  selectedExercise = allExercises.first()
                  chart = findViewById(R.id.lineChart)
                  styleChart()
                  findViewById<ImageView>(R.id.btnBack).setOnClickListener { finish() }
                  val spinner = findViewById<Spinner>(R.id.spinnerExercise)
                  spinner.adapter = ArrayAdapter(this, android.R.layout.simple_spinner_dropdown_item, allExercises)
                  spinner.onItemSelectedListener = object : AdapterView.OnItemSelectedListener {
                      override fun onItemSelected(p: AdapterView<*>, v: View?, pos: Int, id: Long) { selectedExercise = allExercises[pos]; loadGraph() }
                      override fun onNothingSelected(p: AdapterView<*>) {}
                  }
                  loadPersonalRecords()
              }
              private fun styleChart() { chart?.apply { setBackgroundColor(Color.parseColor("#0D0D0D")); description.isEnabled = false; legend.isEnabled = false; setTouchEnabled(true); setPinchZoom(true); setDrawGridBackground(false); xAxis.apply { position = XAxis.XAxisPosition.BOTTOM; textColor = Color.parseColor("#666666"); gridColor = Color.parseColor("#1E1E1E"); axisLineColor = Color.parseColor("#1E1E1E"); granularity = 1f; setDrawAxisLine(true) }; axisLeft.apply { textColor = Color.parseColor("#666666"); gridColor = Color.parseColor("#1E1E1E"); axisLineColor = Color.parseColor("#1E1E1E") }; axisRight.isEnabled = false } }
              private fun loadGraph() {
                  val tvEmpty = findViewById<TextView>(R.id.tvChartEmpty)
                  val type = getExerciseType(selectedExercise)
                  lifecycleScope.launch {
                      repo.getHistoryForExercise(selectedExercise).collectLatest { sets ->
                          if (sets.isEmpty()) { chart?.visibility = View.GONE; tvEmpty?.visibility = View.VISIBLE; return@collectLatest }
                          val byDate = sets.groupBy { it.loggedDate }.entries.sortedBy { it.key }
                          val labels = byDate.map { it.key.substring(5).replace("-", "/") }
                          val entries = byDate.mapIndexed { i, (_, daySets) -> Entry(i.toFloat(), when (type) { ExerciseType.PLANK, ExerciseType.CARDIO -> daySets.maxOf { it.minutes }; else -> daySets.maxOf { it.weightKg } }) }
                          val accentColor = Color.parseColor("#E8FF00")
                          val dataSet = LineDataSet(entries, "").apply { color = accentColor; setCircleColor(accentColor); circleRadius = 4f; circleHoleRadius = 2f; lineWidth = 2.5f; valueTextColor = Color.parseColor("#888888"); valueTextSize = 9f; setDrawFilled(true); fillColor = Color.parseColor("#E8FF00"); fillAlpha = 20; mode = LineDataSet.Mode.CUBIC_BEZIER; setDrawHighlightIndicators(true); highLightColor = Color.parseColor("#E8FF00") }
                          chart?.apply { visibility = View.VISIBLE; tvEmpty?.visibility = View.GONE; xAxis.valueFormatter = IndexAxisValueFormatter(labels); data = LineData(dataSet); animateX(600); invalidate() }
                      }
                  }
              }
              private fun loadPersonalRecords() {
                  val container = findViewById<LinearLayout>(R.id.prContainer)
                  WorkoutPlan.days.flatMap { it.exercises }.forEach { ex ->
                      val type = getExerciseType(ex)
                      lifecycleScope.launch {
                          val flow = if (type == ExerciseType.NORMAL) repo.getMaxWeight(ex) else repo.getMaxMinutes(ex)
                          flow.collectLatest { value ->
                              if (value != null && value > 0f) { runOnUiThread { if (container.findViewWithTag<View>(ex) == null) { val row = layoutInflater.inflate(R.layout.item_pr_row, container, false); row.tag = ex; val unit = if (type == ExerciseType.NORMAL) "kg" else "min"; row.findViewById<TextView>(R.id.tvPrName).text = ex; row.findViewById<TextView>(R.id.tvPrValue).text = "$value $unit"; container.addView(row) } else { val row = container.findViewWithTag<View>(ex); val unit = if (type == ExerciseType.NORMAL) "kg" else "min"; row?.findViewById<TextView>(R.id.tvPrValue)?.text = "$value $unit" } } }
                          }
                      }
                  }
              }
          }
          EOF

      - name: Write XML Resources
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:allowBackup="true" android:label="SADTAZ" android:theme="@style/Theme.SadtazWorkout">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait" android:windowSoftInputMode="adjustResize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
